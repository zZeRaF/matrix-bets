<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#00FF66">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="$MATRIX BET$">
  <link rel="manifest" href="manifest-v3.webmanifest">
  <link rel="icon" type="image/png" href="icons/app-icon-192-v3.png">
  <link rel="shortcut icon" href="icons/app-icon-192-v3.png">
  <link rel="apple-touch-icon" href="icons/app-icon-v3.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/app-icon-v3.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/app-icon-192-v3.png">
  <link rel="stylesheet" href="styles/matrix.css">
  <title>$MATRIX BET$</title>
  <!-- FORCE UPDATE : détecte si l'utilisateur a une ancienne version cachée et force un reset complet -->
  <script>
    (function () {
      var APP_VERSION = "20260513-te";
      var stored = localStorage.getItem("bt-version");
      if (stored !== APP_VERSION) {
        localStorage.setItem("bt-version", APP_VERSION);
        if (stored !== null && "serviceWorker" in navigator) {
          // Version a changé : on désinscrit tous les SW et on vide tous les caches, puis reload.
          // Ne pas boucler : on a déjà mis à jour localStorage, donc au prochain reload on passera.
          Promise.all([
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (r) { return r.unregister(); }));
            }),
            (typeof caches !== "undefined" ? caches.keys().then(function (names) {
              return Promise.all(names.map(function (n) { return caches.delete(n); }));
            }) : Promise.resolve())
          ]).then(function () {
            window.location.reload();
          });
        }
      }
    })();
  </script>
  <!-- Alpine.js 3.14.x -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
  <!-- Three.js via importmap (chargé par js/three-scene.js) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>
</head>
<body x-data="app()" x-init="init()">

  <!-- ─── SPLASH SCREEN (style MATRIX + Galactik vibes + freeze apocalyptique) ─── -->
  <div id="splash" class="splash" :class="{ 'splash-fade': splashFading }" x-show="showSplash" x-cloak
       @click="if (!audioStarted) enableAudio()">
    <canvas id="matrix-rain"></canvas>
    <!-- Ondulations énergétiques Galactik-style (pulse rings) -->
    <div class="splash-pulse-ring"></div>
    <div class="splash-pulse-ring ring-delay-1"></div>
    <div class="splash-pulse-ring ring-delay-2"></div>
    <!-- Bandes de freeze apocalyptique -->
    <div class="apocalypse-bands"></div>
    <!-- Flash ERROR rouge (système corrompu) -->
    <div class="splash-error">! SYSTEM CORRUPTED !</div>
    <!-- Flash WARNING orange -->
    <div class="splash-warning">⚠ ANOMALY DETECTED</div>
    <audio id="splash-audio" preload="auto"></audio>
    <div class="splash-content">
      <div class="splash-logo">
        <span class="splash-brand">
          <span class="splash-typewriter" x-text="splashTitle"></span><span class="cursor"></span>
        </span>
      </div>
      <div class="splash-tagline">// PRONOS FOOT · ANALYSES 4 COUCHES</div>
      <div class="splash-version" id="splash-version">build 20260513-te</div>

      <ul class="splash-log">
        <template x-for="(line, idx) in splashLog" :key="idx">
          <li class="splash-log-line">
            <span class="splash-log-arrow">&gt;</span>
            <span class="splash-log-text" x-text="line.text"></span>
            <span class="splash-log-status" :class="line.status" x-text="line.status === 'ok' ? '[ OK ]' : '[…]'"></span>
          </li>
        </template>
      </ul>
      <div class="splash-progress">
        <div class="splash-progress-bar" :style="{ width: splashProgress + '%' }"></div>
      </div>
      <div class="splash-subtitle">$BeTime$</div>
    </div>
  </div>

  <!-- ─── PLUIE MATRIX EN ARRIÈRE-PLAN (full-screen, sous le body) ─── -->
  <canvas id="bg-rain" class="bg-rain" aria-hidden="true"></canvas>

  <!-- ─── HEADER STICKY : Bankroll + date ─── -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-text">$MATRIX BET$</span>
    </div>
    <div class="bankroll" @click="editBankroll()">
      <span class="bankroll-lbl">BANKROLL</span>
      <span class="bankroll-val" x-text="fmtEur(bankroll)"></span>
    </div>
  </header>

  <!-- ─── BANNIÈRE INFO DU JOUR ─── -->
  <div class="day-banner" x-show="data">
    <span class="day-banner-date" x-text="formatDateFr(data?.date)"></span>
    <span class="day-banner-meta">
      <span x-text="data?.top?.length || 0"></span>&nbsp;paris&nbsp;·&nbsp;
      <span x-text="data?.n_matches_analysed || '?'"></span>&nbsp;matchs analysés
    </span>
  </div>

  <!-- ─── LOADING / ERREUR ─── -->
  <template x-if="state === 'loading'">
    <div class="empty">
      <p class="empty-status">Chargement des paris…</p>
    </div>
  </template>

  <template x-if="state === 'error'">
    <div class="empty">
      <p class="empty-status err">⚠ Impossible de charger latest.json</p>
      <p class="empty-meta" x-text="errorMsg"></p>
      <button class="btn" @click="loadData()">Réessayer</button>
    </div>
  </template>

  <template x-if="state === 'empty'">
    <div class="empty">
      <p class="empty-status">Aucun pari validé aujourd'hui.</p>
      <p class="empty-meta">Reviens plus tard ou consulte les jours précédents.</p>
    </div>
  </template>

  <!-- ─── FIL D'ACTUALITÉ DES PARIS ─── -->
  <main class="feed" x-show="state === 'ok' && tab === 'paris' && currentView === 'feed'">
    <!-- ─── PARIS PLACÉS À RÉSOUDRE ─── -->
    <template x-if="pendingBets().length > 0">
      <section class="pending-bets-section">
        <h2 class="pending-bets-title">
          ⏳ PARIS EN COURS <span class="pending-bets-count" x-text="pendingBets().length"></span>
        </h2>
        <template x-for="bet in pendingBets()" :key="bet.id">
          <article class="pending-bet-card" :data-rule="bet.rule_id">
            <div class="pending-bet-head">
              <span class="pending-bet-rule" x-text="bet.rule_id"></span>
              <span class="pending-bet-match" x-text="bet.home + ' vs ' + bet.away"></span>
            </div>
            <p class="pending-bet-verdict" x-text="bet.verdict"></p>
            <div class="pending-bet-info">
              <span>Mise <strong x-text="fmtEur(bet.mise)"></strong></span>
              <span>@ <strong x-text="fmtNum(bet.cote_book)"></strong></span>
              <span class="pending-bet-potential">→ +<strong x-text="fmtEur(bet.mise * (bet.cote_book - 1))"></strong></span>
            </div>
            <div class="pending-bet-actions">
              <button class="pari-btn-won" @click.stop="resolveBet(bet.id, 'won')">✓ GAGNÉ</button>
              <button class="pari-btn-lost" @click.stop="resolveBet(bet.id, 'lost')">✗ PERDU</button>
            </div>
          </article>
        </template>
      </section>
    </template>

    <template x-for="pari in data.top" :key="pari.rank">
      <article class="bet-card"
               :class="ruleClass(pari.rule_id)"
               @click="openDetail(pari.match_slug)">

        <header class="bet-card-head">
          <span class="rank" x-text="'#' + pari.rank"></span>
          <span class="rule-tag" x-text="pari.rule_id + (pari.rule_id === 'R1' ? ' ⭐' : '')"></span>
          <span class="rule-source" x-text="pari.rule_source"></span>
          <span class="bet-time" x-text="pari.kickoff_time"></span>
        </header>

        <h2 class="match">
          <span class="home" x-text="pari.home_team"></span>
          <span class="vs">vs</span>
          <span class="away" x-text="pari.away_team"></span>
        </h2>

        <p class="competition" x-text="pari.competition + (pari.country ? ' · ' + pari.country : '')"></p>

        <p class="verdict" x-text="pari.verdict"></p>

        <footer class="bet-card-foot">
          <span class="cote">
            <span class="lbl">cote</span>
            <span class="val" x-text="pari.cote_reelle ? pari.cote_reelle.toFixed(2) : '—'"></span>
          </span>
          <span class="mise">
            <span class="lbl">mise (/100€)</span>
            <span class="val" x-text="pari.kelly_mise_100eur ? pari.kelly_mise_100eur.toFixed(2) + '€' : '—'"></span>
          </span>
          <span class="score">
            <span class="lbl">score</span>
            <span class="val" x-text="pari.score_pari?.toFixed(0)"></span>
          </span>
        </footer>
      </article>
    </template>
  </main>

  <!-- ─── VUE DÉTAIL MATCH ─── -->
  <main class="match-detail" x-show="state === 'ok' && tab === 'paris' && currentView === 'detail'" x-cloak>
    <template x-if="selectedMatch()">
      <div>
        <!-- Header retour + nom match -->
        <header class="detail-header">
          <button class="detail-back" @click="backToFeed()">
            <span class="back-arrow">‹</span> RETOUR
          </button>
          <div class="detail-title">
            <h1>
              <span x-text="selectedMatch().home"></span>
              <span class="vs">vs</span>
              <span x-text="selectedMatch().away"></span>
            </h1>
            <p class="detail-meta">
              <span x-text="selectedMatch().competition + (selectedMatch().country ? ' · ' + selectedMatch().country : '')"></span>
              <span class="dot">·</span>
              <span x-text="selectedMatch().kickoff_time"></span>
            </p>
          </div>
        </header>

        <!-- Sous-onglets Analyse / Pari -->
        <nav class="detail-subtabs">
          <button class="subtab" :class="{active: detailSubtab === 'analyse'}" @click="detailSubtab = 'analyse'">ANALYSE</button>
          <button class="subtab" :class="{active: detailSubtab === 'pari'}" @click="detailSubtab = 'pari'">PARI</button>
        </nav>

        <!-- ──── ONGLET ANALYSE ──── -->
        <div class="detail-body" x-show="detailSubtab === 'analyse'">
          <!-- CONSENSUS (verdict final, en premier) -->
          <template x-if="selectedMatch().layers?.consensus">
            <section class="layer-section layer-consensus clickable"
                     @click="openLayer('consensus')"
                     :class="{available: hasLayerHtml('consensus')}">
              <h2 class="layer-title">CONSENSUS <span class="open-arrow" x-show="hasLayerHtml('consensus')">›</span></h2>
              <div class="layer-grid">
                <div class="layer-stat">
                  <div class="stat-lbl">1X2</div>
                  <div class="stat-val" x-text="selectedMatch().layers.consensus.consensus_1x2?.verdict || '—'"></div>
                  <div class="stat-sub" x-text="selectedMatch().layers.consensus.consensus_1x2?.confidence || ''"></div>
                </div>
                <div class="layer-stat">
                  <div class="stat-lbl">OVER / UNDER</div>
                  <div class="stat-val" x-text="selectedMatch().layers.consensus.consensus_ou?.verdict || '—'"></div>
                  <div class="stat-sub" x-text="selectedMatch().layers.consensus.consensus_ou?.confidence || ''"></div>
                </div>
                <template x-if="selectedMatch().layers.consensus.consensus_decisive">
                  <div class="layer-stat">
                    <div class="stat-lbl">JOUEUR DÉCISIF</div>
                    <div class="stat-val" x-text="selectedMatch().layers.consensus.consensus_decisive?.verdict || '—'"></div>
                    <div class="stat-sub" x-text="selectedMatch().layers.consensus.consensus_decisive?.confidence || ''"></div>
                  </div>
                </template>
              </div>
            </section>
          </template>

          <!-- MACRO (saison) -->
          <template x-if="selectedMatch().layers?.macro">
            <section class="layer-section layer-macro clickable"
                     @click="openLayer('macro')"
                     :class="{available: hasLayerHtml('macro')}">
              <h2 class="layer-title">MACRO · saison entière <span class="open-arrow" x-show="hasLayerHtml('macro')">›</span></h2>
              <div class="layer-grid">
                <div class="layer-stat">
                  <div class="stat-lbl">Total buts attendus</div>
                  <div class="stat-val" x-text="fmtNum(selectedMatch().layers.macro.total_buts_attendus)"></div>
                </div>
                <div class="layer-stat">
                  <div class="stat-lbl">Écart domination (E27)</div>
                  <div class="stat-val" x-text="fmtNum(selectedMatch().layers.macro.calculations?.E27)"></div>
                </div>
                <div class="layer-stat">
                  <div class="stat-lbl">Buts attendus HOME (D26)</div>
                  <div class="stat-val" x-text="fmtNum(selectedMatch().layers.macro.calculations?.D26)"></div>
                </div>
                <div class="layer-stat">
                  <div class="stat-lbl">Buts attendus AWAY (F26)</div>
                  <div class="stat-val" x-text="fmtNum(selectedMatch().layers.macro.calculations?.F26)"></div>
                </div>
              </div>
              <template x-if="selectedMatch().layers.macro.calculations">
                <div class="layer-verdict">
                  <span x-text="selectedMatch().layers.macro.calculations?.verdict_1x2 || 'Pas de verdict'"></span>
                </div>
              </template>
            </section>
          </template>

          <!-- MESO (10 derniers) -->
          <template x-if="selectedMatch().layers?.meso">
            <section class="layer-section layer-meso clickable"
                     @click="openLayer('meso')"
                     :class="{available: hasLayerHtml('meso')}">
              <h2 class="layer-title">MESO · forme récente 10 derniers <span class="open-arrow" x-show="hasLayerHtml('meso')">›</span></h2>
              <div class="layer-grid">
                <div class="layer-stat">
                  <div class="stat-lbl">Score HOME</div>
                  <div class="stat-val green" x-text="fmtNum(selectedMatch().layers.meso.global_score_home, 0)"></div>
                </div>
                <div class="layer-stat">
                  <div class="stat-lbl">Score AWAY</div>
                  <div class="stat-val" x-text="fmtNum(selectedMatch().layers.meso.global_score_away, 0)"></div>
                </div>
                <div class="layer-stat">
                  <div class="stat-lbl">Total buts attendus</div>
                  <div class="stat-val" x-text="fmtNum(selectedMatch().layers.meso.total_buts_attendus)"></div>
                </div>
              </div>
            </section>
          </template>

          <!-- MICRO (XI) -->
          <template x-if="selectedMatch().layers?.micro">
            <section class="layer-section layer-micro clickable"
                     @click="openLayer('micro')"
                     :class="{available: hasLayerHtml('micro')}">
              <h2 class="layer-title">MICRO · rapport forces XI <span class="open-arrow" x-show="hasLayerHtml('micro')">›</span></h2>
              <div class="layer-grid">
                <div class="layer-stat">
                  <div class="stat-lbl">Verdict 1X2</div>
                  <div class="stat-val" x-text="selectedMatch().layers.micro.global_verdict_1x2 || '—'"></div>
                </div>
                <div class="layer-stat">
                  <div class="stat-lbl">Zones HOME / TIE / AWAY</div>
                  <div class="stat-val">
                    <span x-text="selectedMatch().layers.micro.global_zones_home || 0"></span>
                    <span class="muted">/</span>
                    <span x-text="selectedMatch().layers.micro.global_zones_tie || 0"></span>
                    <span class="muted">/</span>
                    <span x-text="selectedMatch().layers.micro.global_zones_away || 0"></span>
                  </div>
                </div>
                <div class="layer-stat">
                  <div class="stat-lbl">Total buts attendus</div>
                  <div class="stat-val" x-text="fmtNum(selectedMatch().layers.micro.total_buts_attendus)"></div>
                </div>
              </div>
              <!-- Top joueurs décisifs -->
              <template x-if="selectedMatch().layers.micro.decisive_players">
                <div class="decisive-players">
                  <h3 class="sub-title">Joueurs décisifs</h3>
                  <div class="decisive-grid">
                    <div class="decisive-col">
                      <h4>HOME</h4>
                      <ul>
                        <template x-for="p in (selectedMatch().layers.micro.decisive_players.home || []).slice(0, 3)" :key="p.fm_id">
                          <li>
                            <span class="player-name" x-text="p.name"></span>
                            <span class="player-pos" x-text="'· ' + (p.pos_label || p.role)"></span>
                            <span class="player-score" x-text="fmtNum(p.score_decisif_brut, 1) + '/100'"></span>
                          </li>
                        </template>
                      </ul>
                    </div>
                    <div class="decisive-col">
                      <h4>AWAY</h4>
                      <ul>
                        <template x-for="p in (selectedMatch().layers.micro.decisive_players.away || []).slice(0, 3)" :key="p.fm_id">
                          <li>
                            <span class="player-name" x-text="p.name"></span>
                            <span class="player-pos" x-text="'· ' + (p.pos_label || p.role)"></span>
                            <span class="player-score" x-text="fmtNum(p.score_decisif_brut, 1) + '/100'"></span>
                          </li>
                        </template>
                      </ul>
                    </div>
                  </div>
                </div>
              </template>
            </section>
          </template>

          <!-- NEWS -->
          <template x-if="selectedMatch().layers?.news">
            <section class="layer-section layer-news clickable"
                     @click="openLayer('news')"
                     :class="{available: hasLayerHtml('news')}">
              <h2 class="layer-title">NEWS · contexte qualitatif <span class="open-arrow" x-show="hasLayerHtml('news')">›</span></h2>
              <div class="layer-grid">
                <div class="layer-stat">
                  <div class="stat-lbl">Articles analysés</div>
                  <div class="stat-val">
                    <span x-text="selectedMatch().layers.news.n_articles_scored || 0"></span>
                    <span class="muted">/ <span x-text="selectedMatch().layers.news.n_articles_total || 0"></span></span>
                  </div>
                </div>
                <div class="layer-stat">
                  <div class="stat-lbl">Score favorabilité</div>
                  <div class="stat-val" x-text="selectedMatch().layers.news.favorability || '—'"></div>
                </div>
              </div>
            </section>
          </template>
        </div>

        <!-- ──── ONGLET PARI ──── -->
        <div class="detail-body" x-show="detailSubtab === 'pari'">
          <!-- Bankroll en tête -->
          <div class="pari-bankroll-banner">
            <div>
              <span class="pari-bankroll-lbl">BANKROLL</span>
              <span class="pari-bankroll-val" x-text="fmtEur(bankroll)"></span>
            </div>
            <button class="pari-bankroll-edit" @click="editBankroll()" title="Modifier la bankroll">✎</button>
          </div>

          <!-- Aucun pari recommandé -->
          <template x-if="selectedMatchBets().length === 0">
            <div class="empty">
              <p class="empty-status">AUCUN PARI</p>
              <p class="empty-meta">Aucun pari recommandé par le moteur pour ce match.</p>
            </div>
          </template>

          <!-- Liste des paris recommandés -->
          <template x-for="pari in selectedMatchBets()" :key="pari.rank">
            <section class="pari-card" :data-rule="pari.rule_id">
              <header class="pari-card-header">
                <span class="pari-rule-badge" x-text="pari.rule_id"></span>
                <span class="pari-type" x-text="pari.bet_type"></span>
              </header>
              <h3 class="pari-verdict" x-text="pari.verdict"></h3>
              <p class="pari-reasoning" x-text="pari.reasoning"></p>

              <div class="pari-grid">
                <div class="pari-stat">
                  <div class="stat-lbl">COTE SUGGÉRÉE</div>
                  <div class="stat-val" x-text="fmtNum(pari.cote_reelle || pari.cote_estimee)"></div>
                </div>
                <div class="pari-stat">
                  <div class="stat-lbl">PROBA</div>
                  <div class="stat-val" x-text="fmtPct(pari.proba_validee)"></div>
                </div>
                <div class="pari-stat">
                  <div class="stat-lbl">KELLY</div>
                  <div class="stat-val" x-text="fmtPct(pari.kelly_fraction)"></div>
                </div>
                <div class="pari-stat">
                  <div class="stat-lbl">EDGE</div>
                  <div class="stat-val" x-text="fmtPct(pari.edge)"></div>
                </div>
              </div>

              <!-- État : pari pas encore placé -->
              <template x-if="!getBetForPari(pari)">
                <div class="pari-action">
                  <label class="pari-input-row">
                    <span>Cote bookmaker :</span>
                    <input type="number" step="0.01" inputmode="decimal"
                           x-model="pari._coteSaisie"
                           :placeholder="pari.cote_reelle ? pari.cote_reelle.toFixed(2) : '1.50'"
                           class="pari-cote-input">
                  </label>
                  <div class="pari-mise-preview">
                    <span>Mise calculée (Kelly /<span x-text="pari.rule_id === 'R3' ? '8' : '4'"></span>) :</span>
                    <strong x-text="fmtEur(computeMise(pari, parseFloat(pari._coteSaisie) || pari.cote_reelle))"></strong>
                  </div>
                  <button class="pari-btn-place"
                          @click="placeBet(pari, parseFloat(pari._coteSaisie) || pari.cote_reelle)">
                    ⚡ PLACER LE PARI
                  </button>
                </div>
              </template>

              <!-- État : pari placé (en attente résolution) -->
              <template x-if="getBetForPari(pari) && getBetForPari(pari).status === 'placed'">
                <div class="pari-placed">
                  <div class="pari-placed-row">
                    <span>Placé @ cote <strong x-text="fmtNum(getBetForPari(pari).cote_book)"></strong></span>
                    <span>Mise <strong x-text="fmtEur(getBetForPari(pari).mise)"></strong></span>
                  </div>
                  <div class="pari-placed-row pari-potential">
                    <span>Gain potentiel :</span>
                    <strong class="potential-win" x-text="'+' + fmtEur(getBetForPari(pari).mise * (getBetForPari(pari).cote_book - 1))"></strong>
                  </div>
                  <div class="pari-resolve-actions">
                    <button class="pari-btn-won" @click="resolveBet(getBetForPari(pari).id, 'won')">✓ GAGNÉ</button>
                    <button class="pari-btn-lost" @click="resolveBet(getBetForPari(pari).id, 'lost')">✗ PERDU</button>
                  </div>
                  <button class="pari-btn-cancel" @click="cancelBet(getBetForPari(pari).id)">Annuler ce pari</button>
                </div>
              </template>

              <!-- État : pari gagné -->
              <template x-if="getBetForPari(pari) && getBetForPari(pari).status === 'won'">
                <div class="pari-result pari-result-won">
                  <span class="result-badge">GAGNÉ ✓</span>
                  <span>Mise <span x-text="fmtEur(getBetForPari(pari).mise)"></span> @ <span x-text="fmtNum(getBetForPari(pari).cote_book)"></span></span>
                  <strong class="result-profit" x-text="'+' + fmtEur(getBetForPari(pari).profit)"></strong>
                </div>
              </template>

              <!-- État : pari perdu -->
              <template x-if="getBetForPari(pari) && getBetForPari(pari).status === 'lost'">
                <div class="pari-result pari-result-lost">
                  <span class="result-badge">PERDU ✗</span>
                  <span>Mise <span x-text="fmtEur(getBetForPari(pari).mise)"></span> @ <span x-text="fmtNum(getBetForPari(pari).cote_book)"></span></span>
                  <strong class="result-profit" x-text="fmtEur(getBetForPari(pari).profit)"></strong>
                </div>
              </template>
            </section>
          </template>
        </div>
      </div>
    </template>
  </main>

  <!-- ─── VUE DÉTAIL COUCHE (iframe HTML rendu) ─── -->
  <div class="layer-detail-overlay" x-show="selectedLayer" x-cloak @keydown.escape.window="closeLayer()">
    <header class="layer-detail-header">
      <button class="detail-back" @click="closeLayer()">
        <span class="back-arrow">‹</span> RETOUR
      </button>
      <h2 class="layer-detail-title">
        <span x-text="layerLabel(selectedLayer)"></span>
      </h2>
    </header>
    <iframe class="layer-detail-frame"
            :src="layerHtmlUrl(selectedLayer)"
            x-show="selectedLayer"
            referrerpolicy="no-referrer"
            sandbox="allow-same-origin allow-popups"></iframe>
  </div>

  <!-- ─── ONGLET STATISTIQUES (placeholder) ─── -->
  <main class="placeholder-tab" x-show="tab === 'stats'">
    <p class="empty-status">📊 Statistiques</p>
    <p class="empty-meta">Cet onglet sera disponible en J3 : win rate, ROI, évolution bankroll, perfo par règle.</p>
  </main>

  <!-- ─── BOTTOM NAVIGATION ─── -->
  <nav class="bottom-nav">
    <button class="nav-btn" :class="{active: tab === 'paris'}" @click="tab = 'paris'; backToFeed()">
      <span class="nav-icon">⚡</span>
      <span class="nav-lbl">Paris</span>
    </button>
    <button class="nav-btn" :class="{active: tab === 'stats'}" @click="tab = 'stats'; backToFeed()">
      <span class="nav-icon">📊</span>
      <span class="nav-lbl">Stats</span>
    </button>
  </nav>

  <script src="js/app.js"></script>
  <!-- Three.js désactivé : <script type="module" src="js/three-scene.js"></script> -->

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        // updateViaCache: 'none' force le navigateur à toujours vérifier sw.js
        navigator.serviceWorker.register("sw.js", { updateViaCache: "none" }).catch(() => {});
      });
    }
  </script>
</body>
</html>
