<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#00FF66">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Matrix Bets">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles/matrix.css">
  <title>Matrix Bets</title>
  <!-- Alpine.js 3.14.x -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
</head>
<body x-data="app()" x-init="init()">

  <!-- ─── SPLASH SCREEN (style MATRIX) ─── -->
  <div id="splash" class="splash" :class="{ 'splash-fade': splashFading }" x-show="showSplash" x-cloak>
    <canvas id="matrix-rain"></canvas>
    <div class="splash-content">
      <div class="splash-logo">
        <span class="splash-prompt">$_</span>
        <span class="splash-brand">
          <span class="splash-typewriter" x-text="splashTitle"></span><span class="cursor"></span>
        </span>
      </div>
      <div class="splash-tagline">// PRONOS FOOT · ANALYSES 4 COUCHES</div>

      <!-- ── SCÈNE FOOT EN MODE ROBOT MATRIX ── -->
      <div class="splash-scene" aria-hidden="true">
        <svg viewBox="0 0 400 180" class="scene-svg" preserveAspectRatio="xMidYMid meet">
          <!-- Lignes de terrain (perspective) -->
          <g class="pitch-lines">
            <line x1="0" y1="170" x2="400" y2="170" />
            <line x1="0" y1="155" x2="400" y2="155" stroke-dasharray="4 4" opacity="0.5" />
            <line x1="0" y1="140" x2="400" y2="140" stroke-dasharray="2 6" opacity="0.3" />
          </g>

          <!-- Cage de but (à droite) -->
          <g class="goal">
            <line x1="368" y1="40" x2="368" y2="170" stroke-width="2.5" />
            <line x1="368" y1="40" x2="396" y2="40" stroke-width="2.5" />
            <line x1="396" y1="40" x2="396" y2="170" stroke-width="2.5" />
            <!-- Filet -->
            <line x1="372" y1="45" x2="372" y2="170" opacity="0.4" />
            <line x1="380" y1="45" x2="380" y2="170" opacity="0.4" />
            <line x1="388" y1="45" x2="388" y2="170" opacity="0.4" />
            <line x1="368" y1="55" x2="396" y2="55" opacity="0.4" />
            <line x1="368" y1="85" x2="396" y2="85" opacity="0.4" />
            <line x1="368" y1="115" x2="396" y2="115" opacity="0.4" />
            <line x1="368" y1="145" x2="396" y2="145" opacity="0.4" />
          </g>

          <!-- Flash GOAL (apparaît à la fin du cycle) -->
          <rect class="goal-flash" x="370" y="42" width="24" height="40" />

          <!-- GARDIEN robot -->
          <g class="keeper">
            <!-- Tête robot avec antenne -->
            <rect x="345" y="80" width="14" height="14" />
            <rect x="349" y="76" width="6" height="4" />
            <circle cx="349" cy="86" r="1" class="led" />
            <circle cx="355" cy="86" r="1" class="led" />
            <!-- Corps -->
            <rect x="343" y="95" width="18" height="22" />
            <!-- Bras (gants) -->
            <rect x="335" y="98" width="10" height="5" class="keeper-arm-left" />
            <rect x="359" y="98" width="10" height="5" class="keeper-arm-right" />
            <!-- Jambes -->
            <rect x="345" y="118" width="5" height="14" />
            <rect x="354" y="118" width="5" height="14" />
          </g>

          <!-- DÉFENSEUR robot -->
          <g class="defender">
            <rect x="195" y="80" width="14" height="14" />
            <rect x="199" y="76" width="6" height="4" />
            <circle cx="199" cy="86" r="1" class="led" />
            <circle cx="205" cy="86" r="1" class="led" />
            <rect x="193" y="95" width="18" height="22" />
            <rect x="187" y="98" width="8" height="5" />
            <rect x="211" y="98" width="8" height="5" />
            <rect x="195" y="118" width="5" height="14" />
            <rect x="204" y="118" width="5" height="14" />
          </g>

          <!-- ATTAQUANT robot -->
          <g class="attacker">
            <rect x="75" y="80" width="14" height="14" />
            <rect x="79" y="76" width="6" height="4" />
            <circle cx="79" cy="86" r="1" class="led" />
            <circle cx="85" cy="86" r="1" class="led" />
            <rect x="73" y="95" width="18" height="22" />
            <rect x="67" y="98" width="8" height="5" />
            <rect x="91" y="98" width="8" height="5" />
            <rect x="75" y="118" width="5" height="14" />
            <rect class="attacker-kick-leg" x="84" y="118" width="5" height="14" />
          </g>

          <!-- BALLON -->
          <g class="ball-wrapper">
            <polygon class="ball" points="100,135 105,131 110,135 110,141 105,145 100,141" />
          </g>

          <!-- Texte GOAL (apparaît à la fin) -->
          <text class="goal-text" x="270" y="30" text-anchor="middle">GOAL.</text>
        </svg>
      </div>

      <ul class="splash-log">
        <template x-for="(line, idx) in splashLog" :key="idx">
          <li class="splash-log-line">
            <span class="splash-log-arrow">&gt;</span>
            <span class="splash-log-text" x-text="line.text"></span>
            <span class="splash-log-status" :class="line.status" x-text="line.status === 'ok' ? '[ OK ]' : '[…]'"></span>
          </li>
        </template>
      </ul>
      <div class="splash-progress">
        <div class="splash-progress-bar" :style="{ width: splashProgress + '%' }"></div>
      </div>
    </div>
  </div>

  <!-- ─── HEADER STICKY : Bankroll + date ─── -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-prompt">$_</span>
      <span class="brand-text">MATRIX BETS</span>
    </div>
    <div class="bankroll" @click="editBankroll()">
      <span class="bankroll-lbl">BANKROLL</span>
      <span class="bankroll-val" x-text="fmtEur(bankroll)"></span>
    </div>
  </header>

  <!-- ─── BANNIÈRE INFO DU JOUR ─── -->
  <div class="day-banner" x-show="data">
    <span class="day-banner-date" x-text="formatDateFr(data?.date)"></span>
    <span class="day-banner-meta">
      <span x-text="data?.top?.length || 0"></span>&nbsp;paris&nbsp;·&nbsp;
      <span x-text="data?.n_matches_analysed || '?'"></span>&nbsp;matchs analysés
    </span>
  </div>

  <!-- ─── LOADING / ERREUR ─── -->
  <template x-if="state === 'loading'">
    <div class="empty">
      <p class="empty-status">Chargement des paris…</p>
    </div>
  </template>

  <template x-if="state === 'error'">
    <div class="empty">
      <p class="empty-status err">⚠ Impossible de charger latest.json</p>
      <p class="empty-meta" x-text="errorMsg"></p>
      <button class="btn" @click="loadData()">Réessayer</button>
    </div>
  </template>

  <template x-if="state === 'empty'">
    <div class="empty">
      <p class="empty-status">Aucun pari validé aujourd'hui.</p>
      <p class="empty-meta">Reviens plus tard ou consulte les jours précédents.</p>
    </div>
  </template>

  <!-- ─── FIL D'ACTUALITÉ DES PARIS ─── -->
  <main class="feed" x-show="state === 'ok' && tab === 'paris'">
    <template x-for="pari in data.top" :key="pari.rank">
      <article class="bet-card"
               :class="ruleClass(pari.rule_id)"
               @click="openDetail(pari.match_slug)">

        <header class="bet-card-head">
          <span class="rank" x-text="'#' + pari.rank"></span>
          <span class="rule-tag" x-text="pari.rule_id + (pari.rule_id === 'R1' ? ' ⭐' : '')"></span>
          <span class="rule-source" x-text="pari.rule_source"></span>
          <span class="bet-time" x-text="pari.kickoff_time"></span>
        </header>

        <h2 class="match">
          <span class="home" x-text="pari.home_team"></span>
          <span class="vs">vs</span>
          <span class="away" x-text="pari.away_team"></span>
        </h2>

        <p class="competition" x-text="pari.competition + (pari.country ? ' · ' + pari.country : '')"></p>

        <p class="verdict" x-text="pari.verdict"></p>

        <footer class="bet-card-foot">
          <span class="cote">
            <span class="lbl">cote</span>
            <span class="val" x-text="pari.cote_reelle ? pari.cote_reelle.toFixed(2) : '—'"></span>
          </span>
          <span class="mise">
            <span class="lbl">mise (/100€)</span>
            <span class="val" x-text="pari.kelly_mise_100eur ? pari.kelly_mise_100eur.toFixed(2) + '€' : '—'"></span>
          </span>
          <span class="score">
            <span class="lbl">score</span>
            <span class="val" x-text="pari.score_pari?.toFixed(0)"></span>
          </span>
        </footer>
      </article>
    </template>
  </main>

  <!-- ─── ONGLET STATISTIQUES (placeholder) ─── -->
  <main class="placeholder-tab" x-show="tab === 'stats'">
    <p class="empty-status">📊 Statistiques</p>
    <p class="empty-meta">Cet onglet sera disponible en J3 : win rate, ROI, évolution bankroll, perfo par règle.</p>
  </main>

  <!-- ─── BOTTOM NAVIGATION ─── -->
  <nav class="bottom-nav">
    <button class="nav-btn" :class="{active: tab === 'paris'}" @click="tab = 'paris'">
      <span class="nav-icon">⚡</span>
      <span class="nav-lbl">Paris</span>
    </button>
    <button class="nav-btn" :class="{active: tab === 'stats'}" @click="tab = 'stats'">
      <span class="nav-icon">📊</span>
      <span class="nav-lbl">Stats</span>
    </button>
  </nav>

  <script src="js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
